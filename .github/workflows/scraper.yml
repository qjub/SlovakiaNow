name: 🇸🇰 SlovakiaNow — Auto Scraper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inštalácia knižníc
        run: pip install -r requirements.txt

      - name: Spustenie scrapera
        run: |
          mkdir -p docs/data logs
          python backend/scraper.py

      - name: Commit a push dát
        run: |
          git config user.name "SlovakiaNow Bot"
          git config user.email "bot@slovakianow.sk"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "🔄 Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
